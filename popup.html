<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SORA Downloader</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div class="hero__badge">Personal Export Tool</div>
        <h1>SORA Downloader</h1>
        <p class="hint">
          Scan your generations, then export images + prompts with structure.
        </p>
      </header>

      <section class="card">
        <div class="controls">
          <button id="scanBtn">Scan Page</button>
          <button id="pauseScanBtn">Pause Scan</button>
          <button id="retryFailedBtn">Retry Failed Only</button>
        </div>
        <label class="option checkbox">
          <input id="autoScrollToggle" type="checkbox" checked />
          <span>Auto-scroll while scanning (infinite grid)</span>
        </label>
        <div class="controls">
          <button id="clearCacheBtn">Clear Scan Cache</button>
          <button id="downloadBtn" class="primary">Download All</button>
        </div>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Export Settings</h2>
          <button id="toggleExportSectionBtn" class="section-toggle" type="button" data-target="exportSettingsBody" aria-label="Collapse export settings">▾</button>
        </div>
        <div id="exportSettingsBody">
          <label class="option checkbox">
            <input id="organizeByGenerationToggle" type="checkbox" checked />
            <span>Organize by generation folders</span>
          </label>

          <p class="subhint">Export format is always ZIP (one archive per run).</p>
          <p class="subhint">Image output prefers native PNG; WebP/JPEG converts to PNG as fallback.</p>

          <label class="option">
            Download mode
            <select id="downloadMode">
              <option value="safe" selected>Safe (slower, lower risk)</option>
              <option value="fast">Fast (less delay)</option>
            </select>
            <span class="fieldhint">`Safe` adds more delay to reduce request spikes. `Fast` is quicker but more aggressive.</span>
          </label>

          <label class="option">
            Max items per run
            <input id="maxItems" type="number" min="1" step="1" value="300" />
            <span class="fieldhint">Caps how many scanned items run in one export. Example: 2,000 found + 300 max = about 7 runs.</span>
          </label>

          <label class="option">
            Folder prefix
            <input id="folderPrefix" type="text" value="SORA_EXPORT" />
          </label>
        </div>
      </section>

      <section class="card results">
        <div class="results__head">
          <h2>Found Items</h2>
          <span class="pill">Live</span>
        </div>
        <div class="status-wrap">
          <span id="statusSpinner" class="status-spinner" aria-hidden="true"></span>
          <span id="statusState" class="status-state">Idle</span>
          <div id="status" class="status">Not scanned yet.</div>
        </div>
        <ol id="itemsList"></ol>
      </section>
    </main>

    <div class="bg-glow bg-glow--one"></div>
    <div class="bg-glow bg-glow--two"></div>
    <script src="downloader.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
